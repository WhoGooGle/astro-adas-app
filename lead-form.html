<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Request ADAS Calibration</title>
<style>
  body{font-family:Arial;margin:0;background:#f6f7f9;color:#111}
  header{background:#111;color:#fff;padding:18px}
  header a{color:#fff;text-decoration:none;font-weight:bold}
  main{max-width:900px;margin:auto;padding:16px}
  .card{background:#fff;padding:16px;border-radius:14px;margin:12px 0;box-shadow:0 2px 10px rgba(0,0,0,.06)}
  input,select,textarea,button{width:100%;padding:12px;border-radius:12px;border:1px solid rgba(0,0,0,.15);font-size:14px}
  textarea{min-height:90px}
  button{background:#0b5cff;color:#fff;font-weight:bold;border:none;cursor:pointer}
  .row{display:grid;grid-template-columns:1fr;gap:10px}
  @media(min-width:700px){.row{grid-template-columns:1fr 1fr}}
  .note{font-size:13px;opacity:.85;line-height:1.35}
</style>
</head>
<body>

<header>
  <a href="index.html">← Back</a>
  <h2>Request ADAS Calibration</h2>
</header>

<main>
  <div class="card">
    <p class="note">Fill in the details below. When you tap submit, it will open WhatsApp with a ready-made message to Astro Tyres.</p>
    <div class="row">
      <div><label><b>Name</b></label><input id="name" placeholder="Your name"></div>
      <div><label><b>Phone</b></label><input id="phone" placeholder="Your phone number"></div>
    </div>
    <div class="row">
      <div><label><b>Vehicle Make</b></label><input id="make" placeholder="e.g., Haval"></div>
      <div><label><b>Vehicle Model</b></label><input id="model" placeholder="e.g., H6"></div>
    </div>

    <label><b>What repair was done?</b></label>
    <select id="repair">
      <option>Windscreen replacement</option>
      <option>Wheel alignment</option>
      <option>Suspension repair</option>
      <option>Accident / bumper repair</option>
      <option>Steering repair / SAS reset</option>
      <option>Other</option>
    </select>

    <label style="margin-top:10px;"><b>Extra notes (optional)</b></label>
    <textarea id="notes" placeholder="Any warning lights? Vehicle pulling? Steering wheel off-centre?"></textarea>

    <button id="send" style="margin-top:10px;">Submit on WhatsApp</button>
  </div>

  <div class="card">
    <p class="note"><b>Tip:</b> If possible, attach a photo of your dashboard warning light or repair invoice on WhatsApp.</p>
  </div>
</main>

<script>
document.getElementById("send").addEventListener("click", () => {
  const name = document.getElementById("name").value || "-";
  const phone = document.getElementById("phone").value || "-";
  const make = document.getElementById("make").value || "-";
  const model = document.getElementById("model").value || "-";
  const repair = document.getElementById("repair").value || "-";
  const notes = document.getElementById("notes").value || "-";

  const msg = encodeURIComponent(
`Hi Astro Tyres 👋
ADAS Calibration Request:

Name: ${name}
Phone: ${phone}
Vehicle: ${make} ${model}
Repair done: ${repair}
Notes: ${notes}

Please advise if calibration is required and the next available booking.`
  );

  window.open(`https://wa.me/27735541840?text=${msg}`, "_blank");
});
</script>

</body>
</html>
